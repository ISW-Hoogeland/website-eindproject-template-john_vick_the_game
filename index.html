<body>
  <header>
    <h1>John Vick the Game</h1>
  </header>

  <!-- OVERLAYS OUTSIDE MAIN -->
  <div id="cutscene" class="overlay hidden">
    <div class="cutscene-box">
      <p id="cutscene-text"></p>
      <button id="cutscene-next">Volgende</button>
    </div>
  </div>

  <div id="tutorial" class="overlay hidden">
    <div class="tutorial-box">
      <h2>Tutorial</h2>
      <p>Beweeg met WASD. Klik om te schieten. Vermijd vijanden.</p>
      <button id="tutorial-start">Begin!</button>
    </div>
  </div>

  <div id="tutorial-scene" class="hidden">
    <div id="garden">

      <div id="restricted-area"></div>

      <div id="electric-box">⚡</div>
      <div id="shed">🏠</div>
      <div id="gun" class="hidden">🔫</div>

    </div>

    <div id="inventory">
      <span id="shovel" class="hidden">🪣 Schep</span>
    </div>

    <div id="tutorial-text">
      Open het elektriciteitskastje.
    </div>
  </div>


  <main>
    <div class="menu-buttons">
      <button id="start-btn">Start het Spel</button>
      <button>Laad een Spel</button>
      <button>Instellingen</button>
      <button>Credits</button>
    </div>
  </main>

  <script src="menu.js"></script>
  <link rel="stylesheet" href="styles.css">
</body>
