<!DOCTYPE html>
<html lang="nl">
<link rel="stylesheet" href="styles.css">

<head>
  <title>John Vick The Game</title>
</head>

<body>
  <div id="global-damage-overlay">
    <button id="retry-button" class="hidden" onclick="resetGameToMenu()">
      TERUG NAAR HET HOOFDMENU
    </button>
  </div>

  <div id="game-wrapper">
    <div id="main-menu" class="menu-screen">
      <h1 class="glitch-title">JOHN VICK</h1>
      <nav>
        <button onclick="startGame()">NIEUW SPEL</button>
        <button onclick="showScreen('load-menu')">LAAD SPEL</button>
        <button onclick="showScreen('settings-menu')">INSTELLINGEN</button>
        <button onclick="showScreen('credits-menu')">CREDITS</button>
      </nav>
    </div>

    <div id="load-menu" class="menu-screen hidden">
      <h2>LAAD SPEL</h2>
      <p id="save-status-text">Geen opgeslagen spellen gevonden...</p>
      <button id="execute-load-btn" class="hidden" onclick="loadGame()">
        LAAD DAG X
      </button>
      <br><br>
      <button onclick="showScreen('main-menu')">TERUG</button>
    </div>

    <div id="settings-menu" class="menu-screen hidden">
      <h2>INSTELLINGEN</h2>
      <button onclick="showScreen('main-menu')">TERUG</button>
    </div>

    <div id="credits-menu" class="menu-screen hidden">
      <h2>CREDITS</h2>
      <button onclick="showScreen('main-menu')">TERUG</button>
    </div>
  </div>

  <div id="cutscene-container" class="hidden">
    <div class="dialogue-box">
      <h3 id="speaker-name"></h3>
      <p id="dialogue-text"></p>
      <button id="next-btn" onclick="nextCutsceneStep()">VERDER ></button>
    </div>
  </div>

  <div id="garden-screen" class="menu-screen hidden">
    <div id="garden-view">
      <button class="game-object" id="shed-click-spot" onclick="interactWithShed()"></button>
      <button class="game-object" id="junction-box-click-spot"
        onclick="gameState.currentChapter = 15; openElectricalPuzzleOverLay()"></button>
      <button class="game-object" id="dig-site" onclick="interactWithDigSite()"></button>
      <div id="garden-feedback" class="hidden">
        <p id="garden-feedback-text"></p>
      </div>
    </div>
  </div>

  <div id="shooting-range" class="menu-screen hidden">
    <div id="dummy-container">
      <div class="dummy large" onclick="shootDummy(this)" style="left: 40%; bottom: 40%"></div>
      <div class="dummy medium" onclick="shootDummy(this)" style="left: 30%; bottom: 60%"></div>
      <div class="dummy medium" onclick="shootDummy(this)" style="left: 60%; bottom: 60%"></div>
      <div class="dummy small" onclick="shootDummy(this)" style="left: 35%; bottom: 75%"></div>
      <div class="dummy small" onclick="shootDummy(this)" style="left: 50%; bottom: 75%"></div>
    </div>
  </div>

  <div id="choice-screen" class="menu-screen hidden">
    <div id="choice-view">
      <div id="tunnel-click"
        onclick="showTunnelMessage('Daar ga ik verdwaald raken...'); playCutsceneAudio('assets/daar-raken.wav')"></div>
      <div id="door-click" onclick="interactWithDoor()"></div>
      <div id="choice-feedback" class="hidden">
        <p id="choice-feedback-text"></p>
      </div>
    </div>
  </div>

  <div id="hotel-screen" class="menu-screen hidden">
    <div id="hotel-view">
      <div id="table-click" onclick="startMazePuzzle()"></div>
      <div id="hoteldoor-click" onclick="interactWithHotelDoor()"></div>
      <div id="hotel-feedback" class="hidden">
        <p id="hotel-feedback-text"></p>
      </div>
    </div>
  </div>

  <div id="strip-club" class="menu-screen hidden">
    <div id="unblock-grid">
      <div class="block target" data-id="0" data-orientation="horizontal_target" data-length="2"></div>
      <div class="block" data-id="1" data-orientation="vertical_short" data-length="2"></div>
      <div class="block" data-id="2" data-orientation="vertical_long" data-length="3"></div>
      <div class="block" data-id="3" data-orientation="horizontal" data-length="2"></div>
      <div class="block" data-id="4" data-orientation="vertical_short" data-length="2"></div>
      <div class="block" data-id="5" data-orientation="vertical_long" data-length="3"></div>
      <div class="block" data-id="6" data-orientation="horizontal" data-length="2"></div>
      <div class="block" data-id="7" data-orientation="vertical_short" data-length="2"></div>
      <div class="block" data-id="8" data-orientation="horizontal" data-length="2"></div>
      <div class="block" data-id="9" data-orientation="horizontal" data-length="2"></div>
      <div id="exit-gate"></div>
    </div>
  </div>

  <div id="maze-screen" class="menu-screen hidden">
    <canvas id="maze-canvas" class="hidden"></canvas>
  </div>

  <div id="electrical-puzzle-overlay" class="hidden">
    <div id="electrical-puzzle-frame">
      <button id="close-electrical-puzzle" onclick="closeElectricalPuzzleOverlay()">X</button>

      <div id="circuit-container">
        <div class="circuit-disk type-bocht" id="disk-0" onclick="rotateDisk(0)"></div>
        <div class="circuit-disk type-bocht" id="disk-1" onclick="rotateDisk(1)"></div>
        <div class="circuit-disk type-recht" id="disk-2" onclick="rotateDisk(2)"></div>
        <div class="circuit-disk type-bocht" id="disk-3" onclick="rotateDisk(3)"></div>
        <div class="circuit-disk type-bocht" id="disk-4" onclick="rotateDisk(4)"></div>
        <div class="circuit-disk type-bocht" id="disk-5" onclick="rotateDisk(5)"></div>
        <div class="circuit-disk type-t" id="disk-6" onclick="rotateDisk(6)"></div>
        <div class="circuit-disk type-recht" id="disk-7" onclick="rotateDisk(7)"></div>
      </div>
      <button id="check-electrical-puzzle-btn" onclick="checkElectricalPuzzle()">CONTROLEER SCHAKELING</button>
    </div>
  </div>

  <div id="rob-home" class="menu-screen hidden">
    <div id="rob-view">
      <div id="pws-click" onclick="interactWithPWS()"></div>
      <div id="ebs-click" onclick="interactWithEBS()"></div>
      <div id="nuclear-click" onclick="interactWithNuclear()"></div>
      <div id="robdoor-click" onclick="interactWithRobDoor()"></div>
      <div id="rob-feedback" class="hidden">
        <p id="rob-feedback-text"></p>
      </div>
    </div>
  </div>

  <div id="highway-screen" class="menu-screen hidden">
    <div id="timer-display">TIJD OVER: 90s</div>
    <canvas id="highway-canvas"></canvas>
    <div id="highway-feedback" class="dialogue-box hidden">
      <p id="highway-feedback-text"></p>
    </div>
  </div>

  <div id="jantje-home" class="menu-screen hidden">
    <div id="jantje-view">
      <div id="paper-click" onclick="showJantjeMessage('Hij heeft veel post')"></div>
      <div id="plant-click" onclick="interactWithPlant()"></div>
      <div id="jantjedoor-click" onclick="interactWithJantjeDoor()"></div>
      <div id="jantje-feedback" class="hidden">
        <p id="jantje-feedback-text"></p>
      </div>
    </div>
  </div>

  <div id="jantje-binnen" class="menu-screen hidden">
    <div id="jantje-binnen-view">
      <div id="tv-click"
        onclick="showJantjeBMessage('Het lijkt wel een feestje daar!'); playCutsceneAudio('assets/het-daar.wav')"></div>
      <div id="coke-click"
        onclick="showJantjeBMessage('Er is hier poedersuiker gemorst...'); playCutsceneAudio('assets/er-gemorst.wav')">
      </div>
      <div id="carpet-click"
        onclick="showJantjeBMessage('Een tapijt met ... VLEKKEN!?'); playCutsceneAudio('assets/een-vlekken.wav')"></div>
      <div id="laptop-click" onclick="interactWithLaptop()"></div>
      <div id="jantje-binnen-feedback" class="hidden">
        <p id="jantje-binnen-feedback-text"></p>
      </div>
    </div>
  </div>

  <div id="jantje-laptop" class="menu-screen hidden">
    <div id="jantje-laptop-view">
      <div id="screen-click" onclick="interactWithScreen()"></div>
      <div id="jantje-laptop-feedback" class="hidden">
        <p id="jantje-laptop-feedback-text"></p>
      </div>
    </div>
  </div>

  <div id="NGD-hotel-screen" class="menu-screen hidden">
    <div id="NGD-hotel-screen-view">
      <div id="curtain-click" onclick="interactWithCurtain()"></div>
      <div id="window-click" onclick="interactWithWindow()"></div>
      <div id="magazine-click" onclick="showScreen('magazines-screen')"></div>
    </div>
  </div>

  <div id="magazines-screen" class="menu-screen hidden">
    <div id="magazines-view">
      <div id="manual-click" onclick="interactWithManual()"></div>
      <div id="hoogeblad-click" onclick="interactWithHoogeblad()"></div>
      <div id="lady-click" onclick="interactWithLady()"></div>
      <div id="back-click" onclick="showScreen('NGD-hotel-screen')"></div>
      <div id="magazines-feedback" class="hidden">
        <p id="magazines-feedback-text"></p>
      </div>
    </div>
  </div>

  <div id="chase-screen" class="menu-screen hidden">
    <div id="chase-view">
      <div id="chase-container-1" class="chase-container">
        <div id="police-car-img-1" class="police-car-img"></div>
        <div class="hitbox driver" onclick="shootChaseAgent(1, 'driver')"></div>
        <div class="hitbox passenger" onclick="shootChaseAgent(1, 'passenger')"></div>
      </div>
      <div id="chase-container-2" class="chase-container hidden">
        <div id="police-car-img-2" class="police-car-img"></div>
        <div class="hitbox driver" onclick="shootChaseAgent(2, 'driver')"></div>
        <div class="hitbox passenger" onclick="shootChaseAgent(2, 'passenger')"></div>
      </div>
    </div>
  </div>

  <div id="ditch-screen" class="menu-screen hidden">
    <div id="ditch-screen-view">
      <div id="crowbar-click" onclick="interactWithCrowbar()"></div>
      <div id="toolbox-click" onclick="interactWithToolbox()"></div>
      <div id="condom-click" onclick="showDitchMessage('Tenminste heeft iemand het hier naar zijn zin gehad.')"></div>
      <div id="ditch-feedback" class="hidden">
        <p id="ditch-feedback-text"></p>
      </div>
    </div>
  </div>

  <div id="torture-screen" class="menu-screen hidden">
    <div id="torture-screen-view">
      <div id="electrocution-click" onclick="interactWithElectrocution()"></div>
      <div id="waterboard-click" onclick="interactWithWaterboard()"></div>
      <div id="wrench-click" onclick="interactWithWrench()"></div>
      <div id="tax-click" onclick="interactWithTax()"></div>
      <div id="knife-click" onclick="interactWithKnife()"></div>
      <div id="usb-click" onclick="interactWithUSB()"></div>
      <div id="chromebook-click" onclick="interactWithChromebook()"></div>
      <div id="torture-feedback" class="hidden">
        <p id="torture-feedback-text"></p>
      </div>
    </div>
  </div>

  <div id="after-torture-screen" class="menu-screen hidden">
    <div id="after-torture-screen-view">
      <div id="pen-click" onclick="interactWithPen()"></div>
    </div>
  </div>

  <div id="building-screen" class="menu-screen hidden">
    <div id="building-screen-view">
      <div id="agent-arnold" class="agent static" onclick="shootAgent('arnold')"></div>
      <div id="agent-gertjan" class="agent static" onclick="shootAgent('gertjan')"></div>
      <div id="agent-diederik" class="agent static" onclick="shootAgent('diederik')"></div>
      <div id="agent-kevin" class="agent cover" onclick="shootAgent('kevin')"></div>
      <div id="office-click" class="door-zone" onclick="interactWithOfficeDoor()"></div>
      <div id="toilet-click" class="door-zone" onclick="interactWithToiletDoor()"></div>
      <div id="conference-click" class="door-zone" onclick="interactWithConferenceDoor()"></div>
      <div id="light-left-click" class="door-zone" onclick="shootToiletLight('left')"></div>
      <div id="light-right-click" class="door-zone" onclick="shootToiletLight('right')"></div>
      <div id="toilet-hallway-click" class="door-zone" onclick="interactWithToiletHallway()"></div>
      <div id="keypad-container" class="hidden">
        <div id="keypad-display">CODE INVOEREN:</div>
        <div id="keypad-grid">
          <button onclick="pressKey('1')">1</button>
          <button onclick="pressKey('2')">2</button>
          <button onclick="pressKey('3')">3</button>
          <button onclick="pressKey('4')">4</button>
          <button onclick="pressKey('5')">5</button>
          <button onclick="pressKey('6')">6</button>
          <button onclick="pressKey('7')">7</button>
          <button onclick="pressKey('8')">8</button>
          <button onclick="pressKey('9')">9</button>
          <button onclick="pressKey('back')">⌫</button>
          <button onclick="pressKey('0')">0</button>
          <button onclick="pressKey('ok')">OK</button>
        </div>
      </div>
      <div id="agent-arnold2" class="office-agent" onclick="shootOfficeAgent('arnold2')"></div>
      <div id="agent-matthijs" class="office-agent" onclick="shootOfficeAgent('matthijs')"></div>
      <div id="agent-denise" class="office-agent" onclick="shootOfficeAgent('denise')"></div>
      <div id="agent-gertjan2" class="office-agent" onclick="shootOfficeAgent('gertjan2')"></div>
      <div id="agent-dimitri" class="office-agent" onclick="shootOfficeAgent('dimitri')"></div>
      <div id="mes-click" class="door-zone" onclick="interactWithMes()"></div>
      <div id="keychain-click" class="door-zone" onclick="interactWithKeychain()"></div>
      <div id="drive-click" class="door-zone" onclick="interactWithDrive()"></div>
      <div id="office-exit" class="door-zone" onclick="exitOffice()"></div>
      <div id="building-feedback" class="hidden">
        <p id="building-feedback-text"></p>
      </div>
    </div>
  </div>

  <div id="shop-screen" class="menu-screen hidden">
    <div id="shop-screen-view">
      <div id="cat-click" onclick="playCutscene('na_shop')"></div>
      <div id="bird-click" onclick="showShopMessage('Een schattig volgeltje, maar ik houd niet zo van vogels.')"></div>
      <div id="shop-feedback" class="hidden">
        <p id="shop-feedback-text"></p>
      </div>
    </div>
  </div>

  <button id="dev-skip-button" onclick="devSkip()" style="
    position: fixed; 
    bottom: 20px; 
    right: 20px; 
    z-index: 9999; 
    padding: 10px; 
    background: orange; 
    color: black; 
    font-weight: bold; 
    border: 2px solid black; 
  ">dev skip</button>

  <script src="script.js"></script>
</body>

</html>
